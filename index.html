<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1">
<title>Quest Board</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7c4dff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="QuestBoard">
<link rel="apple-touch-icon" href="icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

/* ═══════ THEMES ═══════ */
[data-theme="light"]{
  --bg:#f2f1f6;
  --bg2:#e8e7ed;
  --glass:rgba(255,255,255,0.72);
  --glass2:rgba(255,255,255,0.55);
  --glass-border:rgba(255,255,255,0.6);
  --glass-border2:rgba(0,0,0,0.06);
  --card:rgba(255,255,255,0.82);
  --card-solid:#fff;
  --text:#1c1c1e;
  --text2:#636366;
  --text3:#aeaeb2;
  --accent:#7c4dff;
  --accent-light:rgba(124,77,255,0.1);
  --accent-glow:rgba(124,77,255,0.25);
  --pink:#ff2d55;
  --orange:#ff9500;
  --green:#34c759;
  --teal:#30d5c8;
  --blue:#007aff;
  --coin:#ffa726;
  --coin-bg:rgba(255,167,38,0.12);
  --xp-track:rgba(124,77,255,0.1);
  --danger:#ff3b30;
  --danger-bg:rgba(255,59,48,0.1);
  --sheet-bg:rgba(242,241,246,0.97);
  --sep:rgba(0,0,0,0.06);
  --shadow:0 2px 16px rgba(0,0,0,0.06);
  --shadow-lg:0 8px 40px rgba(0,0,0,0.1);
}
[data-theme="dark"]{
  --bg:#000000;
  --bg2:#1c1c1e;
  --glass:rgba(44,44,46,0.72);
  --glass2:rgba(44,44,46,0.55);
  --glass-border:rgba(255,255,255,0.08);
  --glass-border2:rgba(255,255,255,0.06);
  --card:rgba(44,44,46,0.82);
  --card-solid:#2c2c2e;
  --text:#f5f5f7;
  --text2:#98989d;
  --text3:#636366;
  --accent:#a78bfa;
  --accent-light:rgba(167,139,250,0.12);
  --accent-glow:rgba(167,139,250,0.2);
  --pink:#ff375f;
  --orange:#ff9f0a;
  --green:#30d158;
  --teal:#40e0d0;
  --blue:#0a84ff;
  --coin:#ffb74d;
  --coin-bg:rgba(255,183,77,0.12);
  --xp-track:rgba(167,139,250,0.12);
  --danger:#ff453a;
  --danger-bg:rgba(255,69,58,0.12);
  --sheet-bg:rgba(28,28,30,0.97);
  --sep:rgba(255,255,255,0.06);
  --shadow:0 2px 16px rgba(0,0,0,0.3);
  --shadow-lg:0 8px 40px rgba(0,0,0,0.5);
}

:root{
  --easy:#34c759;--easy-bg:rgba(52,199,89,0.1);
  --medium:#ff9500;--medium-bg:rgba(255,149,0,0.1);
  --hard:#ff3b30;--hard-bg:rgba(255,59,48,0.1);
  --epic:#af52de;--epic-bg:rgba(175,82,222,0.12);
  --r:16px;--r-sm:12px;--r-xs:8px;
  --safe-t:env(safe-area-inset-top);
  --safe-b:env(safe-area-inset-bottom);
}

html{font-size:16px;-webkit-text-size-adjust:100%}

body{
  font-family:'Nunito',system-ui,-apple-system,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;min-height:100dvh;
  overflow-x:hidden;
  transition:background .35s,color .35s;
  -webkit-tap-highlight-color:transparent;
  -webkit-user-select:none;user-select:none;
  padding-top:var(--safe-t);
}

/* ═══════ MESH GRADIENT BG ═══════ */
.bg-mesh{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  transition:opacity .5s;
}
[data-theme="light"] .bg-mesh{
  background:
    radial-gradient(ellipse 60% 50% at 15% 10%, rgba(124,77,255,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 85% 20%, rgba(255,45,85,0.06) 0%, transparent 55%),
    radial-gradient(ellipse 55% 45% at 50% 85%, rgba(48,213,200,0.06) 0%, transparent 55%),
    radial-gradient(ellipse 40% 40% at 70% 50%, rgba(255,149,0,0.04) 0%, transparent 50%);
}
[data-theme="dark"] .bg-mesh{
  background:
    radial-gradient(ellipse 60% 50% at 15% 10%, rgba(124,77,255,0.05) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 85% 20%, rgba(255,45,85,0.03) 0%, transparent 55%),
    radial-gradient(ellipse 55% 45% at 50% 85%, rgba(48,213,200,0.03) 0%, transparent 55%);
}

/* ═══════ GLASS UTILS ═══════ */
.glass{
  background:var(--glass);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  backdrop-filter:saturate(180%) blur(20px);
  border:1px solid var(--glass-border);
}
.glass2{
  background:var(--glass2);
  -webkit-backdrop-filter:saturate(150%) blur(14px);
  backdrop-filter:saturate(150%) blur(14px);
  border:1px solid var(--glass-border);
}

/* ═══════ LAYOUT ═══════ */
.app{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:0 16px 120px}

/* ═══════ HEADER ═══════ */
.header{
  padding:16px 0 8px;
  display:flex;justify-content:space-between;align-items:center;
}
.header h1{
  font-size:1.8rem;font-weight:900;
  background:linear-gradient(135deg,var(--accent),var(--pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.theme-btn{
  width:40px;height:40px;border:none;border-radius:50%;
  background:var(--glass);
  -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s;
  border:1px solid var(--glass-border);
}
.theme-btn:hover{transform:scale(1.08)}
.theme-btn:active{transform:scale(0.92)}
.theme-btn svg{width:20px;height:20px;fill:var(--text2);transition:fill .3s}

/* ═══════ HERO CARD (character) ═══════ */
.hero-card{
  border-radius:20px;padding:20px;margin:8px 0 14px;
  position:relative;overflow:hidden;
  box-shadow:var(--shadow);
}
.hero-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(124,77,255,0.07),rgba(255,45,85,0.05),rgba(48,213,200,0.04));
  pointer-events:none;
}
.hero-top{display:flex;align-items:center;gap:14px;margin-bottom:16px;position:relative;z-index:1}
.hero-avatar{
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--pink));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px var(--accent-glow);
  flex-shrink:0;position:relative;
}
.hero-avatar svg{width:26px;height:26px;fill:white}
.hero-lvl-badge{
  position:absolute;bottom:-3px;right:-3px;
  background:var(--orange);color:white;
  font-family:'Silkscreen',monospace;font-size:.5rem;
  padding:2px 5px;border-radius:6px;
  box-shadow:0 2px 8px rgba(255,149,0,.3);
}
.hero-name{font-size:1.1rem;font-weight:800}
.hero-title{font-size:.78rem;color:var(--text2);font-weight:600}

.xp-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;position:relative;z-index:1}
.xp-tag{
  font-family:'Silkscreen',monospace;font-size:.5rem;
  color:var(--accent);display:flex;align-items:center;gap:5px;
}
.xp-tag svg{width:14px;height:14px;fill:var(--accent)}
.xp-nums{font-size:.72rem;color:var(--text3);font-weight:700}
.xp-track{height:8px;background:var(--xp-track);border-radius:4px;overflow:hidden;position:relative;z-index:1}
.xp-fill{
  height:100%;border-radius:4px;
  background:linear-gradient(90deg,var(--accent),var(--pink));
  transition:width .8s cubic-bezier(.34,1.56,.64,1);
  position:relative;
}
.xp-fill::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);
  animation:shimmer 2.5s infinite;
}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}

/* ═══════ STATS ═══════ */
.stats{
  display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;
}
.st{
  border-radius:var(--r);padding:12px 8px;text-align:center;
  box-shadow:var(--shadow);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);
}
.st:active{transform:scale(0.95)}
.st-icon{
  width:32px;height:32px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 6px;
}
.st-icon svg{width:17px;height:17px}
.st-val{
  font-family:'Silkscreen',monospace;
  font-size:clamp(.7rem,2.5vw,.9rem);font-weight:700;
  display:block;margin-bottom:1px;
}
.st-lbl{font-size:.58rem;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px}

.st.coins .st-icon{background:var(--coin-bg)}
.st.coins .st-icon svg{fill:var(--coin)}
.st.coins .st-val{color:var(--coin)}
.st.level .st-icon{background:var(--accent-light)}
.st.level .st-icon svg{fill:var(--accent)}
.st.level .st-val{color:var(--accent)}
.st.streak .st-icon{background:var(--danger-bg)}
.st.streak .st-icon svg{fill:var(--danger)}
.st.streak .st-val{color:var(--danger)}
.st.today .st-icon{background:rgba(48,213,200,.1)}
.st.today .st-icon svg{fill:var(--teal)}
.st.today .st-val{color:var(--teal)}

/* ═══════ ACHIEVEMENTS ═══════ */
.achs{
  border-radius:var(--r);padding:14px;margin-bottom:14px;
  box-shadow:var(--shadow);
}
.achs-title{font-size:.6rem;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px}
.achs-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.achs-row::-webkit-scrollbar{display:none}
.ach{
  width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  position:relative;
}
.ach:active{transform:scale(0.88)}
.ach svg{width:18px;height:18px}
.ach.locked{background:var(--bg2);opacity:.35}
.ach.locked svg{fill:var(--text3)}
.ach.on{box-shadow:0 2px 10px var(--accent-glow)}
.ach.on.c1{background:linear-gradient(135deg,#fef3c7,#fde68a)}
.ach.on.c1 svg{fill:#f59e0b}
.ach.on.c2{background:linear-gradient(135deg,#dcfce7,#bbf7d0)}
.ach.on.c2 svg{fill:#22c55e}
.ach.on.c3{background:linear-gradient(135deg,#fce4ec,#f8bbd0)}
.ach.on.c3 svg{fill:#e91e63}
.ach.on.c4{background:linear-gradient(135deg,#ede9fe,#ddd6fe)}
.ach.on.c4 svg{fill:#7c4dff}
.ach.on.c5{background:linear-gradient(135deg,#e0f7fa,#b2ebf2)}
.ach.on.c5 svg{fill:#00897b}
.ach.on.c6{background:linear-gradient(135deg,#fff3e0,#ffe0b2)}
.ach.on.c6 svg{fill:#f57c00}
[data-theme="dark"] .ach.on.c1{background:linear-gradient(135deg,#422006,#78350f)}
[data-theme="dark"] .ach.on.c2{background:linear-gradient(135deg,#052e16,#14532d)}
[data-theme="dark"] .ach.on.c3{background:linear-gradient(135deg,#3b0764,#581c87)}
[data-theme="dark"] .ach.on.c4{background:linear-gradient(135deg,#1e1b4b,#312e81)}
[data-theme="dark"] .ach.on.c5{background:linear-gradient(135deg,#042f2e,#134e4a)}
[data-theme="dark"] .ach.on.c6{background:linear-gradient(135deg,#431407,#7c2d12)}
.ach-tip{
  position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);
  background:var(--card-solid);border-radius:10px;padding:8px 12px;
  font-size:.7rem;font-weight:600;white-space:nowrap;
  box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;
  transition:opacity .2s;z-index:20;
}
.ach:hover .ach-tip{opacity:1}

/* ═══════ STREAK PILL ═══════ */
.streak-pill{
  border-radius:var(--r);padding:12px 16px;margin-bottom:14px;
  display:flex;align-items:center;gap:12px;
  background:linear-gradient(135deg,rgba(255,59,48,.08),rgba(255,149,0,.06));
  border:1px solid rgba(255,59,48,.1);
}
.streak-fire{
  width:38px;height:38px;border-radius:50%;
  background:linear-gradient(135deg,var(--danger),var(--orange));
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  animation:pulse 1.5s ease-in-out infinite;
}
.streak-fire svg{width:20px;height:20px;fill:white}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.streak-info{flex:1}
.streak-t{font-weight:700;font-size:.9rem}
.streak-d{font-size:.72rem;color:var(--text3)}
.streak-b{font-family:'Silkscreen',monospace;font-size:.5rem;color:var(--coin);text-align:right;line-height:1.6}

/* ═══════ SEGMENTED CONTROL (tabs) ═══════ */
.seg{
  display:flex;gap:0;margin-bottom:14px;
  border-radius:var(--r-sm);padding:3px;
  box-shadow:var(--shadow);
}
.seg-btn{
  flex:1;padding:9px 6px;border:none;background:transparent;
  color:var(--text2);font-family:inherit;font-size:.8rem;font-weight:700;
  border-radius:calc(var(--r-sm) - 2px);cursor:pointer;
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
  display:flex;align-items:center;justify-content:center;gap:5px;
}
.seg-btn svg{width:16px;height:16px;fill:var(--text3);transition:fill .3s}
.seg-btn.on{
  background:var(--card-solid);color:var(--text);
  box-shadow:0 1px 6px rgba(0,0,0,.08);
}
[data-theme="dark"] .seg-btn.on{background:var(--card-solid);box-shadow:0 1px 6px rgba(0,0,0,.25)}
.seg-btn.on svg{fill:var(--accent)}
.seg-btn:active{transform:scale(0.95)}

.panel{display:none}
.panel.on{display:block;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ═══════ ADD QUEST (iOS-style grouped list) ═══════ */
.grouped{
  border-radius:var(--r);overflow:hidden;margin-bottom:14px;
  box-shadow:var(--shadow);
}
.grouped-title{
  font-size:.7rem;font-weight:700;color:var(--text2);
  text-transform:uppercase;letter-spacing:.5px;
  padding:8px 16px 6px;
}
.g-row{
  padding:0 16px;display:flex;align-items:center;
  min-height:48px;border-bottom:1px solid var(--sep);
}
.g-row:last-child{border-bottom:none}
.g-input{
  flex:1;padding:13px 0;background:none;border:none;
  color:var(--text);font-family:inherit;font-size:.95rem;font-weight:600;
  outline:none;
}
.g-input::placeholder{color:var(--text3)}
.g-input[type="date"]{-webkit-appearance:none;max-width:150px}
.g-label{font-size:.82rem;font-weight:600;color:var(--text2);margin-right:12px;white-space:nowrap}

.diff-row{
  display:grid;grid-template-columns:repeat(4,1fr);gap:6px;
  padding:10px 16px 14px;
}
.df{
  padding:10px 4px;border:2px solid var(--sep);
  background:var(--card-solid);border-radius:var(--r-sm);
  cursor:pointer;text-align:center;
  transition:all .25s cubic-bezier(.34,1.56,.64,1);
  font-family:inherit;
}
.df:active{transform:scale(0.93)}
.df-ic{
  width:28px;height:28px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 4px;
}
.df-ic svg{width:15px;height:15px}
.df-nm{font-size:.68rem;font-weight:700;display:block;margin-bottom:1px}
.df-co{font-family:'Silkscreen',monospace;font-size:.42rem;color:var(--text3)}

.df[data-d="easy"] .df-ic{background:var(--easy-bg)}
.df[data-d="easy"] .df-ic svg{fill:var(--easy)}
.df[data-d="easy"] .df-nm{color:var(--easy)}
.df[data-d="easy"].on{border-color:var(--easy);box-shadow:0 3px 12px rgba(52,199,89,.18);background:var(--easy-bg)}

.df[data-d="medium"] .df-ic{background:var(--medium-bg)}
.df[data-d="medium"] .df-ic svg{fill:var(--medium)}
.df[data-d="medium"] .df-nm{color:var(--medium)}
.df[data-d="medium"].on{border-color:var(--medium);box-shadow:0 3px 12px rgba(255,149,0,.18);background:var(--medium-bg)}

.df[data-d="hard"] .df-ic{background:var(--hard-bg)}
.df[data-d="hard"] .df-ic svg{fill:var(--hard)}
.df[data-d="hard"] .df-nm{color:var(--hard)}
.df[data-d="hard"].on{border-color:var(--hard);box-shadow:0 3px 12px rgba(255,59,48,.18);background:var(--hard-bg)}

.df[data-d="epic"] .df-ic{background:var(--epic-bg)}
.df[data-d="epic"] .df-ic svg{fill:var(--epic)}
.df[data-d="epic"] .df-nm{color:var(--epic)}
.df[data-d="epic"].on{border-color:var(--epic);box-shadow:0 3px 12px rgba(175,82,222,.18);background:var(--epic-bg)}

.add-btn{
  margin:0 16px 14px;padding:13px;width:calc(100% - 32px);
  border:none;border-radius:var(--r-sm);
  background:var(--accent);color:white;
  font-family:inherit;font-size:.92rem;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;
  transition:all .25s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 4px 16px var(--accent-glow);
}
.add-btn:active{transform:scale(0.96)}
.add-btn svg{width:18px;height:18px;fill:white}

/* ═══════ QUEST LIST ═══════ */
.q-list{display:flex;flex-direction:column;gap:8px}
.qc{
  border-radius:var(--r);padding:14px 16px;
  display:flex;align-items:center;gap:12px;
  box-shadow:var(--shadow);
  transition:all .25s cubic-bezier(.34,1.56,.64,1);
  position:relative;overflow:hidden;
}
.qc::after{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3.5px;
  border-radius:0 2px 2px 0;
}
.qc[data-d="easy"]::after{background:var(--easy)}
.qc[data-d="medium"]::after{background:var(--medium)}
.qc[data-d="hard"]::after{background:var(--hard)}
.qc[data-d="epic"]::after{background:linear-gradient(180deg,var(--epic),var(--pink))}
.qc:active{transform:scale(0.98)}

.q-chk{
  width:34px;height:34px;border-radius:50%;
  border:2.5px solid var(--text3);background:none;
  cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
}
.q-chk svg{width:16px;height:16px;fill:transparent;transition:fill .2s}
.qc[data-d="easy"] .q-chk{border-color:rgba(52,199,89,.35)}
.qc[data-d="medium"] .q-chk{border-color:rgba(255,149,0,.35)}
.qc[data-d="hard"] .q-chk{border-color:rgba(255,59,48,.35)}
.qc[data-d="epic"] .q-chk{border-color:rgba(175,82,222,.35)}
.q-chk:active{transform:scale(1.2)}
.q-chk:active svg{fill:var(--accent)}

.q-body{flex:1;min-width:0}
.q-title{font-size:.9rem;font-weight:700;margin-bottom:3px;word-break:break-word}
.q-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.q-badge{
  font-family:'Silkscreen',monospace;font-size:.38rem;
  padding:2.5px 7px;border-radius:4px;
  text-transform:uppercase;letter-spacing:.8px;
}
.q-badge.easy{background:var(--easy-bg);color:var(--easy)}
.q-badge.medium{background:var(--medium-bg);color:var(--medium)}
.q-badge.hard{background:var(--hard-bg);color:var(--hard)}
.q-badge.epic{background:var(--epic-bg);color:var(--epic)}
.q-coins{font-size:.72rem;color:var(--coin);font-weight:700;display:flex;align-items:center;gap:2px}
.q-coins svg{width:12px;height:12px;fill:var(--coin)}
.q-date{font-size:.68rem;color:var(--text3);display:flex;align-items:center;gap:2px}
.q-date svg{width:11px;height:11px;fill:var(--text3)}

.q-del{
  background:none;border:none;color:var(--text3);
  cursor:pointer;padding:6px;border-radius:8px;
  transition:all .2s;flex-shrink:0;opacity:0;
}
.q-del svg{width:14px;height:14px;fill:currentColor}
.qc:hover .q-del,.qc:active .q-del{opacity:1}
.q-del:active{color:var(--danger);background:var(--danger-bg)}

.qc.done{animation:qDone .55s ease forwards}
@keyframes qDone{
  0%{transform:scale(1);opacity:1}
  40%{transform:scale(1.02);opacity:1}
  100%{transform:scale(0.95) translateX(15px);opacity:0}
}

.empty{text-align:center;padding:50px 20px;color:var(--text3)}
.empty svg{width:48px;height:48px;fill:var(--text3);opacity:.3;margin-bottom:10px}
.empty p{font-size:.85rem}

/* ═══════ SHOP ═══════ */
.shop-add{
  border-radius:var(--r);overflow:hidden;margin-bottom:14px;box-shadow:var(--shadow);
}
.r-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.rc{
  border-radius:var(--r);padding:18px 14px;text-align:center;
  box-shadow:var(--shadow);
  transition:all .25s cubic-bezier(.34,1.56,.64,1);
  position:relative;
}
.rc:active{transform:scale(0.96)}
.rc-ic{
  width:44px;height:44px;border-radius:14px;
  background:var(--coin-bg);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 8px;
}
.rc-ic svg{width:22px;height:22px;fill:var(--coin)}
.rc-nm{font-weight:700;font-size:.88rem;margin-bottom:3px}
.rc-cost{
  font-family:'Silkscreen',monospace;font-size:.48rem;
  color:var(--coin);margin-bottom:10px;
  display:flex;align-items:center;justify-content:center;gap:3px;
}
.rc-cost svg{width:10px;height:10px;fill:var(--coin)}
.buy{
  padding:8px 18px;border:none;border-radius:20px;
  background:var(--accent);color:white;
  font-family:inherit;font-size:.75rem;font-weight:700;
  cursor:pointer;transition:all .25s cubic-bezier(.34,1.56,.64,1);
}
.buy:active:not(:disabled){transform:scale(0.93)}
.buy:disabled{opacity:.3;cursor:not-allowed;background:var(--text3)}
.rc .rdel{
  position:absolute;top:6px;right:6px;background:none;border:none;
  color:var(--text3);cursor:pointer;opacity:0;transition:opacity .2s;
  padding:4px;border-radius:6px;
}
.rc .rdel svg{width:12px;height:12px;fill:currentColor}
.rc:hover .rdel,.rc:active .rdel{opacity:1}
.rdel:active{color:var(--danger)}

/* ═══════ HISTORY ═══════ */
.h-list{display:flex;flex-direction:column;gap:4px}
.hi{
  border-radius:var(--r-sm);padding:10px 14px;
  display:flex;align-items:center;gap:10px;
  background:var(--card);
  -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
}
.hi-chk svg{width:18px;height:18px;fill:var(--green)}
.hi-t{flex:1;font-weight:600;color:var(--text3);font-size:.85rem}
.hi-c{color:var(--coin);font-weight:700;font-size:.78rem;display:flex;align-items:center;gap:2px}
.hi-c svg{width:11px;height:11px;fill:var(--coin)}
.hi-time{color:var(--text3);font-size:.68rem}

/* ═══════ EFFECTS ═══════ */
#confetti{position:fixed;inset:0;pointer-events:none;z-index:9999}

.fly-coin{
  position:fixed;pointer-events:none;z-index:9998;
  animation:coinUp .85s cubic-bezier(.34,1.56,.64,1) forwards;
}
.fly-coin svg{width:26px;height:26px;fill:var(--coin);filter:drop-shadow(0 2px 6px rgba(255,167,38,.4))}
@keyframes coinUp{
  0%{opacity:1;transform:scale(1) translateY(0)}
  50%{opacity:1;transform:scale(1.4) translateY(-25px)}
  100%{opacity:0;transform:scale(.5) translateY(-70px)}
}

.lu-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.5);
  -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:center;
  z-index:10000;opacity:0;pointer-events:none;
  transition:opacity .3s;
}
.lu-overlay.show{opacity:1;pointer-events:auto}
.lu-box{text-align:center;animation:luIn .5s cubic-bezier(.34,1.56,.64,1)}
.lu-circle{
  width:80px;height:80px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--pink));
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 14px;
  box-shadow:0 0 40px var(--accent-glow);
}
.lu-circle svg{width:36px;height:36px;fill:white}
.lu-t{font-size:1.8rem;font-weight:900;color:white;margin-bottom:4px}
.lu-l{font-family:'Silkscreen',monospace;font-size:.9rem;color:var(--orange)}
@keyframes luIn{0%{transform:scale(.3);opacity:0}60%{transform:scale(1.06)}100%{transform:scale(1);opacity:1}}

.toasts{position:fixed;top:calc(12px + var(--safe-t,0px));left:16px;right:16px;z-index:10001;display:flex;flex-direction:column;gap:6px;max-width:480px;margin:0 auto}
.toast{
  border-radius:var(--r-sm);padding:12px 16px;
  font-weight:700;font-size:.82rem;
  box-shadow:var(--shadow-lg);
  animation:tIn .35s cubic-bezier(.34,1.56,.64,1);
  display:flex;align-items:center;gap:8px;
  color:var(--text);
  background:var(--glass);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  backdrop-filter:saturate(180%) blur(20px);
  border:1px solid var(--glass-border);
}
.toast svg{width:18px;height:18px;flex-shrink:0}
.toast.out{animation:tOut .25s ease forwards}
@keyframes tIn{from{transform:translateY(-20px) scale(.95);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
@keyframes tOut{to{transform:translateY(-20px) scale(.95);opacity:0}}

/* ═══════ MOBILE ═══════ */
@media(max-width:400px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .diff-row{grid-template-columns:repeat(2,1fr)}
  .r-grid{grid-template-columns:1fr}
}
@media(hover:none){
  .q-del{opacity:.6}
  .rc .rdel{opacity:.6}
}
::-webkit-scrollbar{width:0;height:0}
</style>
</head>

    <div class="streak-info"><div class="streak-t" id="stT">3 дня!</div><div class="streak-d">Не теряй серию!</div></div>
    <div class="streak-b" id="stB">+5</div>
  </div>

  <div class="seg glass">
    <button class="seg-btn on" data-t="quests"><svg viewBox="0 0 24 24"><path d="M14.4 6L14 4H5v17h2v-7h5.6l.4 2h7V6z"/></svg>Квесты</button>
    <button class="seg-btn" data-t="shop"><svg viewBox="0 0 24 24"><path d="M18.36 9l.6 3H5.04l.6-3h12.72M20 4H4v2h16V4zm0 3H4l-1 5v2h1v6h10v-6h4v6h2v-6h1v-2l-1-5z"/></svg>Магазин</button>
    <button class="seg-btn" data-t="history"><svg viewBox="0 0 24 24"><path d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7a6.98 6.98 0 0 1-4.95-2.05l-1.41 1.41A8.96 8.96 0 0 0 13 21a9 9 0 0 0 0-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>История</button>

  <!-- SHOP -->

<script>
/* ═══ SVG snippets ═══ */
const I={
  coin:`<svg viewBox="0 0 24 24" fill="var(--coin)"><circle cx="12" cy="12" r="10"/><path d="M12 6v12M9 9h6M9 15h4" stroke="white" stroke-width="1.5" fill="none"/></svg>`,
  coinS:`<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="var(--coin)"/></svg>`,
  check:`<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>`,
  checkG:`<svg viewBox="0 0 24 24" fill="var(--green)"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>`,
  x:`<svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>`,
  cal:`<svg viewBox="0 0 24 24" fill="var(--text3)"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.1 0-2 .9-2 2v14a2 2 0 0 0 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/></svg>`,
  flag:`<svg viewBox="0 0 24 24" fill="var(--accent)"><path d="M14.4 6L14 4H5v17h2v-7h5.6l.4 2h7V6z"/></svg>`,
  gift:`<svg viewBox="0 0 24 24" fill="var(--coin)"><path d="M20 6h-2.18c.11-.31.18-.65.18-1a2.996 2.996 0 0 0-5.5-1.65l-.5.67-.5-.68A2.996 2.996 0 0 0 6 5c0 .35.07.69.18 1H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2z"/></svg>`,
};

/* ═══ AUDIO ═══ */
const A=(()=>{let c;const g=()=>{if(!c)c=new(window.AudioContext||window.webkitAudioContext)();if(c.state==='suspended')c.resume();return c};
const t=(f,d,tp='square',v=.08,dl=0)=>{const x=g(),o=x.createOscillator(),gn=x.createGain();o.type=tp;o.frequency.setValueAtTime(f,x.currentTime+dl);gn.gain.setValueAtTime(v,x.currentTime+dl);gn.gain.exponentialRampToValueAtTime(.001,x.currentTime+dl+d);o.connect(gn);gn.connect(x.destination);o.start(x.currentTime+dl);o.stop(x.currentTime+dl+d)};
return{coin(){t(988,.07,'square',.07);t(1319,.11,'square',.07,.05)},accept(){t(523,.07,'triangle',.09);t(659,.07,'triangle',.09,.06);t(784,.1,'triangle',.09,.12)},complete(){t(784,.07,'square',.06);t(988,.07,'square',.06,.06);t(1175,.07,'square',.06,.12);t(1568,.14,'square',.08,.18)},lvlUp(){[523,659,784,1047,1319,1568].forEach((f,i)=>{t(f,.12,'square',.07,i*.06);t(f*1.5,.12,'triangle',.04,i*.06)})},streak(){t(659,.09,'triangle',.07);t(784,.09,'triangle',.07,.08);t(988,.09,'triangle',.07,.16);t(1175,.14,'sine',.05,.24)},buy(){t(784,.07,'sine',.07);t(523,.1,'sine',.05,.07)},err(){t(200,.1,'sawtooth',.05);t(150,.14,'sawtooth',.03,.08)},del(){t(400,.05,'triangle',.04);t(300,.08,'triangle',.03,.04)}}})();

/* ═══ CONFETTI ═══ */
const C=(()=>{const cv=document.getElementById('confetti'),c=cv.getContext('2d');let ps=[],run=false;
const re=()=>{cv.width=innerWidth;cv.height=innerHeight};addEventListener('resize',re);re();
const cols=['#7c4dff','#ff2d55','#34c759','#ff9500','#30d5c8','#af52de','#007aff','#ffa726'];
function burst(x,y,n=45){for(let i=0;i<n;i++){const a=(Math.PI*2*i)/n+(Math.random()-.5),sp=2.5+Math.random()*5;ps.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1.5,sz:2.5+Math.random()*4,col:cols[~~(Math.random()*cols.length)],life:1,dec:.012+Math.random()*.013,rot:Math.random()*360,rs:(Math.random()-.5)*8})}if(!run){run=true;anim()}}
function anim(){c.clearRect(0,0,cv.width,cv.height);ps=ps.filter(p=>p.life>0);ps.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.vx*=.99;p.life-=p.dec;p.rot+=p.rs;c.save();c.translate(p.x,p.y);c.rotate(p.rot*Math.PI/180);c.globalAlpha=p.life;c.fillStyle=p.col;c.beginPath();c.roundRect(-p.sz/2,-p.sz/2,p.sz,p.sz*.6,1.5);c.fill();c.restore()});if(ps.length>0)requestAnimationFrame(anim);else run=false}
return{burst}})();

/* ═══ STATE ═══ */
const CV={easy:10,medium:25,hard:50,epic:100},XPV={easy:15,medium:30,hard:60,epic:120};
const TITLES=['Новичок','Ученик','Воин','Рыцарь','Мастер','Чемпион','Легенда','Мифический'];
function xpFor(l){return Math.floor(80*Math.pow(1.3,l-1))}
function td(){return new Date().toISOString().split('T')[0]}

const DEF={coins:0,xp:0,level:1,streak:0,lastA:null,quests:[],done:[],
rewards:[{id:'r1',name:'30 мин игр',cost:50},{id:'r2',name:'Заказать пиццу',cost:150},{id:'r3',name:'Серия',cost:30}],
total:0,theme:'light'};
let S;

function load(){try{const s=JSON.parse(localStorage.getItem('qb3'));S=s?{...DEF,...s}:{...DEF}}catch{S={...DEF}}
document.documentElement.setAttribute('data-theme',S.theme||'light');updateThIcon();checkSt()}
function save(){localStorage.setItem('qb3',JSON.stringify(S))}
function checkSt(){if(!S.lastA)return;if(Math.floor((new Date(td())-new Date(S.lastA))/864e5)>1){S.streak=0;save()}}
function bon(){return S.streak>=30?20:S.streak>=14?15:S.streak>=7?10:S.streak>=3?5:0}

/* ═══ ACHIEVEMENTS ═══ */
const ACHS=[
  {id:'first',n:'Первый шаг',d:'1 квест',ic:'<svg viewBox="0 0 24 24"><path d="M14.4 6L14 4H5v17h2v-7h5.6l.4 2h7V6z"/></svg>',c:'c1',ok:s=>s.total>=1},
  {id:'ten',n:'Десятка',d:'10 квестов',ic:'<svg viewBox="0 0 24 24"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>',c:'c2',ok:s=>s.total>=10},
  {id:'rich',n:'Богач',d:'500 монет',ic:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>',c:'c3',ok:s=>s.coins>=500},
  {id:'s7',n:'7 дней',d:'Серия 7',ic:'<svg viewBox="0 0 24 24"><path d="M13.5.67s.74 2.65.74 4.8c0 2.06-1.35 3.73-3.41 3.73-2.07 0-3.63-1.67-3.63-3.73l.03-.36C5.21 7.51 4 10.62 4 14c0 4.42 3.58 8 8 8s8-3.58 8-8C20 8.61 17.41 3.8 13.5.67z"/></svg>',c:'c4',ok:s=>s.streak>=7},
  {id:'l5',n:'Ветеран',d:'Уровень 5',ic:'<svg viewBox="0 0 24 24"><path d="M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v1c0 2.55 1.92 4.63 4.39 4.94A5.01 5.01 0 0 0 11 15.9V19H7v2h10v-2h-4v-3.1a5.01 5.01 0 0 0 3.61-2.96C19.08 12.63 21 10.55 21 8V7c0-1.1-.9-2-2-2z"/></svg>',c:'c5',ok:s=>s.level>=5},
  {id:'f50',n:'Полтинник',d:'50 квестов',ic:'<svg viewBox="0 0 24 24"><path d="M5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82zM12 3L1 9l11 6 9-4.91V17h2V9L12 3z"/></svg>',c:'c6',ok:s=>s.total>=50},
];

/* ═══ RENDER ═══ */
function an(el,to){const fr=parseInt(el.textContent)||0;if(fr===to)return;const d=to-fr,st=Math.min(Math.abs(d),22),ms=Math.max(20,300/st);let i=0;const iv=setInterval(()=>{i++;el.textContent=Math.round(fr+(d*(i/st)));if(i>=st){el.textContent=to;clearInterval(iv)}},ms)}

function render(){
  an($('vC'),S.coins);an($('vL'),S.level);an($('vS'),S.streak);
  an($('vT'),S.done.filter(q=>q.at&&q.at.startsWith(td())).length);
  const mx=xpFor(S.level);$('cXP').textContent=S.xp;$('mXP').textContent=mx;
  $('xpF').style.width=Math.min((S.xp/mx)*100,100)+'%';
  $('hLvl').textContent='Lv.'+S.level;
  $('hTitle').textContent=TITLES[Math.min(S.level-1,TITLES.length-1)];
  const bn=$('stBan');
  if(S.streak>=3){bn.style.display='flex';$('stT').textContent=S.streak+' дней подряд!';const b=bon();$('stB').textContent=b>0?'+'+b:'';}else bn.style.display='none';
  rQ();rR();rH();rA();
}

function rQ(){
  const l=$('qL');
  if(!S.quests.length){l.innerHTML=`<div class="empty"><svg viewBox="0 0 24 24"><path d="M14.4 6L14 4H5v17h2v-7h5.6l.4 2h7V6z"/></svg><p>Нет квестов — добавь новый!</p></div>`;return}
  l.innerHTML=S.quests.map(q=>{const c=CV[q.diff]+bon();return`
    <div class="qc glass" data-id="${q.id}" data-d="${q.diff}">
      <button class="q-chk" onclick="complete('${q.id}',event)">${I.check}</button>
      <div class="q-body"><div class="q-title">${esc(q.title)}</div><div class="q-meta">
        <span class="q-badge ${q.diff}">${{easy:'Легко',medium:'Средне',hard:'Сложно',epic:'Эпик'}[q.diff]}</span>
        <span class="q-coins">${I.coinS} ${c}</span>
        ${q.date?`<span class="q-date">${I.cal} ${fD(q.date)}</span>`:''}
      </div></div>
      <button class="q-del" onclick="delQ('${q.id}')">${I.x}</button>
    </div>`}).join('');
}

function rR(){
  const g=$('rG');
  if(!S.rewards.length){g.innerHTML='<div class="empty"><svg viewBox="0 0 24 24"><path d="M18.36 9l.6 3H5.04l.6-3h12.72M20 4H4v2h16V4zm0 3H4l-1 5v2h1v6h10v-6h4v6h2v-6h1v-2l-1-5z"/></svg><p>Добавь награды!</p></div>';return}
  const ics=[I.gift,
    `<svg viewBox="0 0 24 24" fill="var(--coin)"><path d="M11 9H9V2H7v7H5V2H3v7c0 2.12 1.66 3.84 3.75 3.97V22h2.5v-9.03C11.34 12.84 13 11.12 13 9V2h-2v7z"/></svg>`,
    `<svg viewBox="0 0 24 24" fill="var(--coin)"><path d="M21 3H3c-1.1 0-2 .9-2 2v12a2 2 0 0 0 2 2h5v2h8v-2h5c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"/></svg>`,
    `<svg viewBox="0 0 24 24" fill="var(--coin)"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>`,
    `<svg viewBox="0 0 24 24" fill="var(--coin)"><path d="M20 3H4v10c0 2.21 1.79 4 4 4h6c2.21 0 4-1.79 4-4v-3h2a2 2 0 0 0 2-2V5c0-1.1-.9-2-2-2zm0 5h-2V5h2v3z"/></svg>`];
  g.innerHTML=S.rewards.map((r,i)=>`
    <div class="rc glass"><button class="rdel" onclick="delR('${r.id}')">${I.x}</button>
      <div class="rc-ic">${ics[i%ics.length]}</div>
      <div class="rc-nm">${esc(r.name)}</div>
      <div class="rc-cost">${I.coinS} ${r.cost}</div>
      <button class="buy" onclick="buyR('${r.id}')" ${S.coins<r.cost?'disabled':''}>${S.coins>=r.cost?'Купить':'Мало'}</button>
    </div>`).join('');
}

function rH(){
  const l=$('hL'),rec=[...S.done].reverse().slice(0,50);
  if(!rec.length){l.innerHTML='<div class="empty"><svg viewBox="0 0 24 24"><path d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.95-2.05l-1.41 1.41A8.96 8.96 0 0 0 13 21a9 9 0 0 0 0-18z"/></svg><p>Пока пусто</p></div>';return}
  l.innerHTML=rec.map(q=>`<div class="hi"><div class="hi-chk">${I.checkG}</div><span class="hi-t">${esc(q.title)}</span><span class="hi-c">${I.coinS} +${q.earned||CV[q.diff]}</span><span class="hi-time">${fDT(q.at)}</span></div>`).join('');
}

function rA(){$('achR').innerHTML=ACHS.map(a=>{const ok=a.ok(S);return`<div class="ach ${ok?'on '+a.c:'locked'}">${a.ic}<div class="ach-tip">${a.n}<br><span style="font-size:.58rem;color:var(--text3)">${a.d}</span></div></div>`}).join('')}

/* ═══ ACTIONS ═══ */
let diff='easy';
document.querySelectorAll('.df').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.df').forEach(x=>x.classList.remove('on'));b.classList.add('on');diff=b.dataset.d}));
$('addB').addEventListener('click',addQ);$('qI').addEventListener('keydown',e=>{if(e.key==='Enter')addQ()});

function addQ(){
  const inp=$('qI'),dt=$('qD'),t=inp.value.trim();if(!t){A.err();inp.focus();return}
  S.quests.push({id:'q'+Date.now()+Math.random().toString(36).slice(2,5),title:t,diff,date:dt.value||null});
  save();inp.value='';dt.value='';A.accept();toast(I.flag,'Квест принят!');render();
}

window.complete=function(id,ev){
  const q=S.quests.find(x=>x.id===id);if(!q)return;
  const card=document.querySelector(`.qc[data-id="${id}"]`);
  if(card){card.classList.add('done');const r=ev?ev.target.getBoundingClientRect():card.getBoundingClientRect();C.burst(r.left+r.width/2,r.top+r.height/2,35);spawnCoin(r.left+r.width/2,r.top)}
  const b=bon(),c=CV[q.diff]+b,xp=XPV[q.diff];
  S.coins+=c;S.xp+=xp;S.total++;
  const today=td();
  if(S.lastA!==today){const last=S.lastA?new Date(S.lastA):null,now=new Date(today);
    if(last&&Math.floor((now-last)/864e5)===1){S.streak++;if([3,7,14,30].includes(S.streak))setTimeout(()=>{A.streak();toast(`<svg viewBox="0 0 24 24" fill="#ef4444" width="18" height="18"><path d="M13.5.67s.74 2.65.74 4.8c0 2.06-1.35 3.73-3.41 3.73-2.07 0-3.63-1.67-3.63-3.73l.03-.36C5.21 7.51 4 10.62 4 14c0 4.42 3.58 8 8 8s8-3.58 8-8C20 8.61 17.41 3.8 13.5.67z"/></svg>`,S.streak+' дней! Бонус +'+bon())},600)}
    else if(!last)S.streak=1;S.lastA=today}
  S.quests=S.quests.filter(x=>x.id!==id);S.done.push({...q,at:new Date().toISOString(),earned:c});
  const mx=xpFor(S.level);if(S.xp>=mx){S.xp-=mx;S.level++;setTimeout(()=>showLU(S.level),500)}
  save();A.complete();A.coin();toast(I.coin,`+${c} монет | +${xp} XP`);setTimeout(render,400);
};
window.delQ=function(id){S.quests=S.quests.filter(x=>x.id!==id);save();A.del();render()};
window.buyR=function(id){const r=S.rewards.find(x=>x.id===id);if(!r||S.coins<r.cost){A.err();return}S.coins-=r.cost;save();A.buy();C.burst(innerWidth/2,innerHeight/2,60);toast(I.gift,'Ты заслужил: '+r.name+'!');render()};
$('addR').addEventListener('click',addRew);
function addRew(){const n=$('rN'),c=$('rC'),nm=n.value.trim(),cost=parseInt(c.value);if(!nm||!cost||cost<1){A.err();return}S.rewards.push({id:'r'+Date.now(),name:nm,cost});save();n.value='';c.value='';A.accept();toast(I.gift,'Награда добавлена!');render()}
window.delR=function(id){S.rewards=S.rewards.filter(x=>x.id!==id);save();A.del();render()};

/* ═══ THEME ═══ */
$('thBtn').addEventListener('click',()=>{S.theme=S.theme==='light'?'dark':'light';document.documentElement.setAttribute('data-theme',S.theme);updateThIcon();save()});
function updateThIcon(){$('thIco').innerHTML=S.theme==='dark'?'<path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 0 0-1.41 0 .996.996 0 0 0 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 0 0-1.41 0 .996.996 0 0 0 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0a.996.996 0 0 0 0-1.41l-1.06-1.06zm1.06-10.96a.996.996 0 0 0 0-1.41.996.996 0 0 0-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36a.996.996 0 0 0 0-1.41.996.996 0 0 0-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/>':'<path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/>'}

/* ═══ TABS ═══ */
document.querySelectorAll('.seg-btn').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.seg-btn').forEach(x=>x.classList.remove('on'));document.querySelectorAll('.panel').forEach(x=>x.classList.remove('on'));b.classList.add('on');$('p-'+b.dataset.t).classList.add('on')}));

/* ═══ EFFECTS ═══ */
function spawnCoin(x,y){const el=document.createElement('div');el.className='fly-coin';el.innerHTML=I.coin;el.style.left=x+'px';el.style.top=y+'px';document.body.appendChild(el);setTimeout(()=>el.remove(),850)}
function toast(ic,txt){const c=$('toasts'),t=document.createElement('div');t.className='toast';t.innerHTML=`<span>${ic}</span><span>${txt}</span>`;c.appendChild(t);setTimeout(()=>{t.classList.add('out');setTimeout(()=>t.remove(),250)},2200)}
function showLU(lv){A.lvlUp();C.burst(innerWidth/2,innerHeight/3,80);const o=$('luO');$('luTxt').textContent='Уровень '+lv;o.classList.add('show');setTimeout(()=>o.classList.remove('show'),2600)}

/* ═══ UTILS ═══ */
function $(id){return document.getElementById(id)}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fD(d){try{return new Date(d+'T00:00:00').toLocaleDateString('ru-RU',{day:'numeric',month:'short'})}catch{return d}}
function fDT(d){try{const t=new Date(d);return t.toLocaleDateString('ru-RU',{day:'numeric',month:'short'})+' '+t.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})}catch{return''}}

/* ═══ SW ═══ */
if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});

/* ═══ INIT ═══ */
load();render();
</script>
</body>
</html>
